openapi: 3.1.0
info:
  title: mcre-tools API
  version: 0.0.1
paths:
  /v1/jukugo/{character}/left-search:
    get:
      summary: 熟語の左側の文字を検索
      parameters:
        - in: path
          name: character
          required: true
          schema:
            type: string
            example: "力"
          description: 右側の文字
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JukugoSearchResponse"

  /v1/jukugo/{character}/right-search:
    get:
      summary: 熟語の右側の文字を検索
      parameters:
        - in: path
          name: character
          required: true
          schema:
            type: string
            example: "力"
          description: 左側の文字
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JukugoSearchResponse"

  /v1/group-roulette/rooms:
    post:
      summary: グループルーレットの部屋を作成
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
      responses:
        "201":
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GroupRouletteCreateRoomResponse"
        "400":
          description: リクエスト不正

components:
  schemas:
    JukugoSearchResponse:
      type: array
      items:
        type: object
        required:
          - character
          - cost
        properties:
          character:
            type: string
            description: 熟語の反対側の文字
          cost:
            type: integer
            description: 熟語生成コスト
    GroupRouletteCreateRoomResponse:
      type: object
      required:
        - roomId
        - hostToken
        - expiresAt
      properties:
        roomId:
          type: string
          description: 部屋 ID
          example: room_abc123
        hostToken:
          type: string
          description: ホスト操作用 token。作成レスポンスでのみ返す。
          example: host_abc123
        expiresAt:
          type: string
          format: date-time
          description: 部屋のユーザー向け有効期限
          example: "2026-05-09T09:30:00Z"
